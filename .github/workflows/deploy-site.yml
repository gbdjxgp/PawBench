name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
      - 'submissions/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyyaml

      - name: Build task & leaderboard data
        # build_tasks.py first (so aggregate_results.py can join with tasks.json),
        # then aggregate_results.py to refresh submissions/ from any tracked
        # raw runs under result/ (typically empty in CI), then build_leaderboard.py
        # to roll the submissions/ tree into leaderboard.json.
        run: |
          python site/scripts/build_tasks.py
          python site/scripts/aggregate_results.py
          python site/scripts/build_leaderboard.py

      # npm 10.x / 11.x kept hanging on this lockfile with
      # "Exit handler never called!" — see prior workflow runs. Switching
      # the install layer to pnpm avoids that codepath entirely.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install Node deps
        working-directory: site
        run: |
          pnpm install --frozen-lockfile
          echo "--- node_modules/.bin/astro check ---"
          ls -la node_modules/.bin/astro
          node_modules/.bin/astro --version

      - name: Build Astro site
        working-directory: site
        env:
          PAWBENCH_SITE: https://agentscope-ai.github.io
          # Repo was renamed to PawBench on 2026-06; keep BASE case-aligned so
          # canonical Pages URL and in-page asset paths agree.
          PAWBENCH_BASE: /PawBench/
        # Skip `pnpm exec` here — it runs a deps-status precheck that
        # bails on the "Ignored build scripts" warning. The astro binary
        # works fine called directly.
        run: node_modules/.bin/astro build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
