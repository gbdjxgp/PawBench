name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
      - 'submissions/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyyaml

      - name: Build task & leaderboard data
        # build_tasks.py first (so aggregate_results.py can join with tasks.json),
        # then aggregate_results.py to refresh submissions/ from any tracked
        # raw runs under result/ (typically empty in CI), then build_leaderboard.py
        # to roll the submissions/ tree into leaderboard.json.
        run: |
          python site/scripts/build_tasks.py
          python site/scripts/aggregate_results.py
          python site/scripts/build_leaderboard.py

      - uses: actions/setup-node@v4
        with:
          # Node 22 ships a newer npm with fixes for the "Exit handler never
          # called!" hang we hit on 20.x during sharp/native postinstall.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install Node deps
        working-directory: site
        env:
          # Headroom for native module postinstall (sharp etc.) on the 7 GB runner.
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          # --ignore-scripts skips package postinstalls (sharp binary download,
          # esbuild self-check, etc.) where the hang happens. We then rebuild
          # only the native deps we actually need, which is fast and predictable.
          npm ci --no-audit --no-fund --ignore-scripts
          npm rebuild esbuild
          echo "--- node_modules/.bin/astro check ---"
          ls -la node_modules/.bin/astro
          node_modules/.bin/astro --version

      - name: Build Astro site
        working-directory: site
        env:
          PAWBENCH_SITE: https://agentscope-ai.github.io
          PAWBENCH_BASE: /pawbench/
        # Invoke astro via its installed path rather than via `npm run build`'s
        # PATH resolution, which has bitten us once with `sh: astro: not found`
        # even when `npm ci` reported success.
        run: node_modules/.bin/astro build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
